name: Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-bootstrap:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish bootstrap
        run: dotnet publish SS14.Launcher.Bootstrap/SS14.Launcher.Bootstrap.csproj --configuration Release --runtime win-x64

      - uses: actions/upload-artifact@v4
        with:
          name: bootstrap
          retention-days: 1
          path: SS14.Launcher.Bootstrap/bin/Release/net10.0-windows/win-x64/publish/Final Frontier Launcher.exe

  build-release:
    runs-on: ubuntu-latest
    needs: build-windows-bootstrap

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download Windows bootstrap
        uses: actions/download-artifact@v4
        with:
          name: bootstrap

      - name: Build release archives
        run: python3 publish.py osx linux windows --x64-only

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          FinalFrontierLauncher_Windows.zip
          FinalFrontierLauncher_Linux.zip
          FinalFrontierLauncher_macOS.zip
          --title "Final Frontier Launcher ${GITHUB_REF_NAME}"
          --generate-notes
